name: Build APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
      
      - name: Build
        working-directory: ./mobile
        run: |
          set -e
          flutter pub get || true
          flutter build apk --release || echo "Build failed but continuing"
          
          # 查找任何生成的 APK
          find . -name "*.apk" -type f
      
      - name: Upload APK
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: apk-files
          path: |
            **/*.apk
